<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
#btnBack{
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  z-index:999;
}
</style>
</head>

<body style="margin:0; overflow:hidden;">

<button id="btnBack">返回展示</button>

<a-scene
  embedded
  renderer="logarithmicDepthBuffer: true;"
  vr-mode-ui="enabled:false"
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <a-camera look-controls="enabled:false"></a-camera>

  <a-entity
    gltf-model="switch.glb"
    position="0 0 -1.5"
    scale="1 1 1"
    rotation="90 0 0">
  </a-entity>

  <a-light type="ambient" intensity="0.9"></a-light>
  <a-light type="directional" position="1 2 1" intensity="1"></a-light>

</a-scene>

<script>
document.getElementById('btnBack').onclick = () => {
  window.location.href = "index.html";
};
</script>

</body>
</html>
