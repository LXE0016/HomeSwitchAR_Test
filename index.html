<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

.a-enter-vr-button {
  display: none !important;
}

#enterAR{
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  z-index:999;
}
</style>
</head>

<body>

<button id="enterAR">進入 AR</button>

<a-scene
  id="scene"
  vr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test,local-floor"
>

  <a-camera 
    id="cam"
    position="0 1.4 1.8"
    look-controls="enabled: false"
    wasd-controls="enabled: false">
  </a-camera>

  <a-entity id="displayModel" position="0 1.2 -2" scale="2 2 2">
    <a-entity
      gltf-model="switch.glb"
      rotation="90 0 0">
    </a-entity>
  </a-entity>

  <a-entity id="arModel" visible="false">
    <a-entity
      gltf-model="switch.glb"
      rotation="90 0 0">
    </a-entity>
  </a-entity>

  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 3 2" intensity="1"></a-light>

</a-scene>

<script>
const scene = document.querySelector('#scene');
const cam = document.querySelector('#cam');
const arModel = document.querySelector('#arModel');

let placed = false;

document.getElementById('enterAR').onclick = async () => {
  await scene.enterVR();
};

scene.addEventListener('enter-vr', () => {
  if (scene.is('ar-mode')) {

    document.querySelector('#displayModel').setAttribute('visible', false);

    placed = false;
    arModel.setAttribute('visible', false);
  }
});

scene.addEventListener('exit-vr', () => {

  document.querySelector('#displayModel').setAttribute('visible', true);

  arModel.setAttribute('visible', false);
});

window.addEventListener('click', () => {

  if (!scene.is('ar-mode')) return;
  if (placed) return;

  const camObj = cam.object3D;

  const pos = new THREE.Vector3();
  const dir = new THREE.Vector3();

  camObj.getWorldPosition(pos);
  camObj.getWorldDirection(dir);

  const spawn = pos.clone().add(dir.multiplyScalar(1.5));

  arModel.object3D.position.copy(spawn);

  arModel.setAttribute('visible', true);

  placed = true;
});

</script>

</body>
</html>
