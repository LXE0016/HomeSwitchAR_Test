<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

.a-enter-vr-button {
  display: none !important;
}

#enterAR{
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  z-index:999;
}
</style>
</head>

<body>

<button id="enterAR">進入 AR</button>

<a-scene
  id="scene"
  vr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test,local-floor"
>

  <a-camera id="cam"></a-camera>

    <a-entity
      gltf-model="switch.glb"
      scale="1 1 1"
      rotation="90 0 0">
    </a-entity>

</a-scene>

<script>
const scene = document.querySelector('#scene');
const cam = document.querySelector('#cam');
const model = document.querySelector('#modelWrap');

let placed = false;

document.getElementById('enterAR').onclick = async () => {
  await scene.enterVR();
};

scene.addEventListener('enter-vr', () => {
  if (scene.is('ar-mode')) {
    placed = false;
    model.setAttribute('visible', false);
  }
});

window.addEventListener('click', () => {

  if (!scene.is('ar-mode')) return;
  if (placed) return;

  model.setAttribute('visible', true);

  const camPos = new THREE.Vector3();
  cam.object3D.getWorldPosition(camPos);

  const dir = new THREE.Vector3();
  cam.object3D.getWorldDirection(dir);

  const spawnPos = camPos.clone().add(dir.multiplyScalar(1.5));

  model.object3D.position.copy(spawnPos);

  placed = true;
});
</script>

</body>
</html>
