<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }

#enterAR{
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  z-index:999;
}
</style>
</head>

<body>

<button id="enterAR">進入 AR</button>

<a-scene
  id="scene"
  embedded
  vr-mode-ui="enabled: false"
  webxr="requiredFeatures: hit-test,local-floor"
>

  <a-entity camera position="0 1.2 2"></a-entity>

  <a-entity id="modelWrap" position="0 1.2 -2" scale="2 2 2">
    <a-entity
      gltf-model="switch.glb"
      rotation="90 0 0">
    </a-entity>
  </a-entity>

  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 3 2" intensity="1"></a-light>

</a-scene>

<script>
const scene = document.querySelector('#scene');
const model = document.querySelector('#modelWrap');

let isDragging = false;
let px = 0, py = 0;
let scale = 2;

function start(x,y){
  isDragging = true;
  px = x;
  py = y;
}

function move(x,y){
  if(!isDragging) return;

  let dx = x - px;
  let dy = y - py;

  px = x;
  py = y;

  let r = model.getAttribute('rotation');

  r.y += dx * 0.5;
  r.x -= dy * 0.3;
  r.x = Math.max(-30, Math.min(30, r.x));

  model.setAttribute('rotation', r);
}

function end(){
  isDragging = false;
}

document.addEventListener('mousedown', e => start(e.clientX, e.clientY));
document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
document.addEventListener('mouseup', end);

document.addEventListener('touchstart', e => {
  if(e.touches.length === 1){
    start(e.touches[0].clientX, e.touches[0].clientY);
  }
});
document.addEventListener('touchmove', e => {
  if(e.touches.length === 1){
    move(e.touches[0].clientX, e.touches[0].clientY);
  }
});
document.addEventListener('touchend', end);

document.addEventListener('wheel', e => {
  scale -= e.deltaY * 0.002;
  scale = Math.max(1, Math.min(5, scale));
  model.setAttribute('scale', `${scale} ${scale} ${scale}`);
});

let startDist = 0;

document.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (startDist === 0) {
      startDist = dist;
      return;
    }

    let delta = dist - startDist;
    startDist = dist;

    scale += delta * 0.01;
    scale = Math.max(1, Math.min(5, scale));

    model.setAttribute('scale', `${scale} ${scale} ${scale}`);
  }
});

document.addEventListener('touchend', () => {
  startDist = 0;
});

document.getElementById('enterAR').onclick = async () => {
  await scene.enterVR();
};

scene.addEventListener('enter-vr', () => {

  if (!scene.is('ar-mode')) return;

  const cam = scene.camera.el.object3D;

  const pos = new THREE.Vector3();
  const dir = new THREE.Vector3();

  cam.getWorldPosition(pos);
  cam.getWorldDirection(dir);

  const spawn = pos.clone().add(dir.multiplyScalar(1.5));

  model.object3D.position.copy(spawn);

});
</script>

</body>
</html>
