<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<a-scene
  vr-mode-ui="enabled: false"
  webxr="requiredFeatures: hit-test,local-floor"
>

  <a-camera 
    id="cam"
    position="0 1.4 1.6"
    look-controls="enabled: false">
  </a-camera>

  <a-entity id="rotator" position="0 1.2 -1.8" scale="2 2 2">

    <a-entity
      id="model"
      gltf-model="switch.glb"
      rotation="90 0 0">
    </a-entity>

  </a-entity>

  <a-light type="ambient" intensity="1"></a-light>
  <a-light type="directional" position="1 3 2" intensity="1"></a-light>

</a-scene>

<script>
const rotator = document.querySelector('#rotator');
const model = document.querySelector('#model');
const cam = document.querySelector('#cam');

let isDragging = false;
let px = 0, py = 0;
let scale = 2;

function start(x,y){
  isDragging = true;
  px = x;
  py = y;
}

function move(x,y){
  if(!isDragging) return;

  let dx = x - px;
  let dy = y - py;

  px = x;
  py = y;

  let r = rotator.getAttribute('rotation');

  r.y += dx * 0.5;
  r.x -= dy * 0.3;

  r.x = Math.max(-30, Math.min(30, r.x));

  rotator.setAttribute('rotation', r);
}

function end(){
  isDragging = false;
}

document.addEventListener('mousedown', e => start(e.clientX, e.clientY));
document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
document.addEventListener('mouseup', end);

document.addEventListener('touchstart', e => {
  if(e.touches.length === 1){
    start(e.touches[0].clientX, e.touches[0].clientY);
  }
});
document.addEventListener('touchmove', e => {
  if(e.touches.length === 1){
    move(e.touches[0].clientX, e.touches[0].clientY);
  }
});
document.addEventListener('touchend', end);


document.addEventListener('wheel', e => {
  scale -= e.deltaY * 0.002;
  scale = Math.max(1, Math.min(5, scale));
  rotator.setAttribute('scale', `${scale} ${scale} ${scale}`);
});

let startDist = 0;

document.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (startDist === 0) {
      startDist = dist;
      return;
    }

    let delta = dist - startDist;
    startDist = dist;

    scale += delta * 0.01;
    scale = Math.max(1, Math.min(5, scale));

    rotator.setAttribute('scale', `${scale} ${scale} ${scale}`);
  }
});

document.addEventListener('touchend', () => {
  startDist = 0;
});


let placed = false;

window.addEventListener('click', () => {

  const scene = document.querySelector('a-scene');

  if (!scene.is('ar-mode')) return;
  if (placed) return;

  rotator.setAttribute('rotation', {x:0, y:0, z:0});
  rotator.setAttribute('scale', '1 1 1');

  // 放到鏡頭前
  const pos = cam.object3D.getWorldPosition(new THREE.Vector3());

  rotator.object3D.position.set(
    pos.x,
    pos.y - 0.5,
    pos.z - 1.5
  );

  placed = true;
});

</script>

</body>
</html>
