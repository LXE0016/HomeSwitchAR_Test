<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>
#btnAR{
  position: fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
  z-index:999;
}
</style>
</head>

<body style="margin:0; overflow:hidden;">

<button id="btnAR">進入 AR</button>

<a-scene background="color:#ECECEC" vr-mode-ui="enabled:false" environment="preset: city">

  <a-camera position="0 1 1.4" rotation="-10 0 0"></a-camera>

  <a-light type="ambient" intensity="0.6"></a-light>
  <a-light type="directional" position="2 4 3" intensity="1.2"></a-light>

  <a-entity position="0 0.7 0" scale="3 3 3">
    <a-entity gltf-model="switch.glb" rotation="90 0 0"></a-entity>
  </a-entity>

</a-scene>

<script>
document.getElementById('btnAR').onclick = () => {
  window.location.href = "ar.html";
};
</script>

</body>
</html>
